<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <!-- Permet au site de s'adapter correctement aux téléphones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chat IA</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/images/favicon.png">
</head>

<body>

    <div class="chat-container">

        <button id="reset-chat-button" class="reset-button">
            Nouvelle Conversation
        </button>

        <h1>Chat IA</h1>

        <div id="chat-messages" class="chat-messages">

        </div>

        <div id="loader" class="loader-hidden">
            <!-- Information: la classe 'loader-hidden' sera utilisée par JS pour masquer
            le loader -->
            <div class="spinner"></div>
            <p>L'IA est en train d'écrire...</p>
        </div>

        <form id="chat-form" class="chat-form">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Posez votre question..." 
                autocomplete="off"
            >

            <button class="bouton" type="submit">
                Envoyer
            </button>
        </form>

    </div>

    <script src="api.js" type="module"></script>

</body>

</html>
